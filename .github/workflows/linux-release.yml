name: Linux Package v5.1

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Build Linux v5.1 package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build archives
        shell: bash
        run: |
          set -euo pipefail
          PKG="lr-swaper-linux-v5.1"
          mkdir -p dist "$PKG"
          rsync -a --exclude='__pycache__' --exclude='.venv' --exclude='dist' linux/ "$PKG"/
          tar -czf "dist/${PKG}.tar.gz" "$PKG"
          zip -qr "dist/${PKG}.zip" "$PKG"
          ls -lh dist

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: lr-swaper-linux-v5.1
          path: dist/*
