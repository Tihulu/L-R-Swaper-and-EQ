name: Linux Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example linux-v4.9
        required: true
        default: linux-v4.9
      title:
        description: Release title
        required: true
        default: L/R Swaper Linux v4.9
  push:
    tags:
      - 'linux-v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Linux release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            TITLE="${{ github.event.inputs.title }}"
          else
            TAG="${GITHUB_REF_NAME}"
            TITLE="L/R Swaper Linux ${GITHUB_REF_NAME#linux-v}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${TAG#linux-v}"
          PKG="lr-swaper-linux-v${VERSION}"
          mkdir -p dist "$PKG"
          rsync -a \
            --exclude='__pycache__' \
            --exclude='.venv' \
            --exclude='dist' \
            linux/ "$PKG"/
          tar -czf "dist/${PKG}.tar.gz" "$PKG"
          zip -qr "dist/${PKG}.zip" "$PKG"
          ls -lh dist

      - name: Prepare release notes
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${TAG#linux-v}"
          NOTES="linux/release-notes/linux-v${VERSION}.md"
          if [ -f "$NOTES" ]; then
            cp "$NOTES" RELEASE_NOTES.md
          else
            cat > RELEASE_NOTES.md <<EOF
          # L/R Swaper Linux v${VERSION}

          ## Quick install

          \`\`\`bash
          bash <(curl -fsSL https://raw.githubusercontent.com/Tihulu/L-R-Swaper-and-EQ/main/linux/quick-install.sh)
          \`\`\`
          EOF
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          TITLE="${{ steps.meta.outputs.title }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "$TITLE" \
              --notes-file RELEASE_NOTES.md
          fi
